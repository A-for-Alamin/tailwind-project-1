<!DOCTYPE html>
<html lang="en" id="htmlTag">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News-Ticker AI</title>

    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="../src/output.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <!-- commed in terminal  -->

    <!-- npx tailwindcss -i ./public/input.css -o ./src/output.css --watch -->
</head>

<body class="bg-white dark:bg-gray-900">
    <!-- header section  -->
    <header class="md:mx-14 md:py-4 py-2 px-2">
        <nav class="container mx-auto flex items-center justify-between">
            <div class="flex items-center gap-1 md:gap-3">
                <img src="assets/tickerAI-logo 1.png" alt="Logo" class="w-10 md:w-fit ">
                <p class="text-[8px] md:text-xs dark:text-white"> A Mark Cuban Company <br>
                    AI-based Financial Market News Aggregator</p>
            </div>

            <div class="flex items-center gap-2 md:gap-7">
                <a href="index.html">
                    <button
                        class="bg-[#5677ac] md:text-base text-xs md:py-2 py-1 md:px-5 px-2 rounded-md text-white font-semibold hover:bg-[#42449e] hover:scale-105 hover:translate-y-1 transition">Personalize
                        News</button>
                </a>

                <div
                    class="text-[#5677ac] bg-[#5677ac26] md:text-2xl text-lg font-bold size-9 rounded-full flex items-center justify-center hover:scale-105 transition-all cursor-pointer">
                    IK
                </div>

                <button id="switch">
                    <i class="fa fa-moon text-2xl dark:text-white hover:scale-105 transition-all duration-300"></i>
                </button>
            </div>
        </nav>
    </header>




    <section class="bg-[#f0f0f0] dark:bg-gray-700 md:px-0 px-4 w-full min-h-screen">
        <section class="container mx-auto md:py-12 py-8">
            <div class="flex items-center justify-between pb-1 md:pb-2.5 border-b md:border-b-[3px] border-black md:mx-16 dark:border-white">
                <h3 class="md:text-2xl text-lg font-semibold uppercase text-[background: #333333;] dark:text-white">Personalize your
                    news</h3>
            </div>

            <div class="bg-white max-w-lg mx-auto md:mt-10 pt-6 p-8">
                <h3 class="md:text-2xl text-lg font-semibold text-center text-[#333333]">Select your Market</h3>

                <div class="py-5 space-y-5">
                    <p class="news-head">Stocks</p>
                    <p class="news-head">Crypto</p>
                    <p class="news-head">Economy & Business</p>
                    <p class="news-head">Commodities | Forex</p>
                    <p class="news-head">Fixed Income</p>
                </div>

                <button
                    class="bg-[#5677AC] w-full py-2 md:py-4 rounded-full text-white font-medium md:text-lg hover:bg-[#42669e] transition-all duration-300 hover:scale-110 cursor-pointer">Continue</button>
            </div>
        </section>
    </section>




    <footer class="text-black text-center pb-5 w-full dark:text-white">
        All right reserved to TickerAI - 2024
    </footer>


    <script>
        const htmlTag = document.getElementById("htmlTag");

        document.getElementById("switch").addEventListener("click", function () {
            htmlTag.classList.toggle("dark");
        });
    </script>
</body>

</html>
